<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0d3b2e" />
  <title>Harcourts Photos</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <main class="container">
    <header class="masthead">
      <h1>Harcourts Photos</h1>
      <p class="subtitle">Pick the consultant and the active listing session.</p>
    </header>

    <section class="card" id="picker">
      <label class="field">
        <span>Consultant</span>
        <select id="consultant"></select>
      </label>
      <label class="field">
        <span>Session</span>
        <select id="session" disabled></select>
      </label>
      <button class="primary" id="open" disabled>Open upload page</button>
    </section>

    <p class="hint" id="hint">
      If you do not see your session here, start the listing in the
      <strong>Harcourts Listings</strong> chat first.
    </p>
  </main>

  <script>
    const consultantSel = document.getElementById('consultant');
    const sessionSel = document.getElementById('session');
    const openBtn = document.getElementById('open');

    async function loadConsultants() {
      const res = await fetch('/api/consultants');
      const data = await res.json();
      consultantSel.innerHTML = '<option value="">— select —</option>' +
        data.items.map(s => `<option value="${s}">${s}</option>`).join('');
    }

    async function loadSessions(slug) {
      sessionSel.disabled = true;
      sessionSel.innerHTML = '<option>loading…</option>';
      const res = await fetch('/api/sessions/' + encodeURIComponent(slug));
      const data = await res.json();
      if (!data.items.length) {
        sessionSel.innerHTML = '<option value="">No sessions yet</option>';
        return;
      }
      sessionSel.innerHTML = '<option value="">— select —</option>' +
        data.items.map(s => `<option value="${s.name}">${s.name}</option>`).join('');
      sessionSel.disabled = false;
    }

    consultantSel.addEventListener('change', () => {
      openBtn.disabled = true;
      if (consultantSel.value) loadSessions(consultantSel.value);
      else sessionSel.innerHTML = '';
    });
    sessionSel.addEventListener('change', () => {
      openBtn.disabled = !(consultantSel.value && sessionSel.value);
    });
    openBtn.addEventListener('click', () => {
      const slug = encodeURIComponent(consultantSel.value);
      const sess = encodeURIComponent(sessionSel.value);
      window.location.href = `/u/${slug}/${sess}`;
    });

    loadConsultants();
  </script>
</body>
</html>
